services:
  postgres:
    image: postgres:16-alpine
    container_name: polymarket-db
    environment:
      POSTGRES_USER: polybot
      POSTGRES_PASSWORD: polybot_dev_2026
      POSTGRES_DB: polymarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polybot -d polymarket"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
